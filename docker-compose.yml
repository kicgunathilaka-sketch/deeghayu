version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: deeghayu_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-deeghayu}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      POSTGRES_DB: ${DB_NAME:-deeghayu_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: deeghayu_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: deeghayu_api
    restart: unless-stopped
    depends_on:
      - db
      - redis
    env_file:
      - ./apps/api/.env
    ports:
      - '3001:3001'

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: deeghayu_web
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
